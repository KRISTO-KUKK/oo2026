<!doctype html>
<html lang="et">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kümnevõistlus</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Decathlon</p>
            <h1>Kümnevõistlus</h1>
        </div>
        <div id="status" class="status" role="status"></div>
    </header>

    <section class="workspace">
        <aside class="panel">
            <form id="athlete-form" class="stack">
                <h2>Sportlane</h2>
                <label>
                    Nimi
                    <input id="athlete-name" name="name" autocomplete="name" required>
                </label>
                <label>
                    Riik
                    <input id="athlete-country" name="country" maxlength="3" placeholder="EST" required>
                </label>
                <button type="submit">Lisa sportlane</button>
            </form>

            <form id="result-form" class="stack">
                <h2>Tulemus</h2>
                <label>
                    Sportlane
                    <select id="result-athlete" name="athleteId" required></select>
                </label>
                <label>
                    Ala
                    <select id="result-event" name="event" required></select>
                </label>
                <label>
                    Tulemus
                    <input id="result-performance" name="performance" type="number" min="0.01" step="0.01" required>
                </label>
                <button type="submit">Lisa tulemus</button>
            </form>
        </aside>

        <section class="main-panel">
            <form id="filter-form" class="filters">
                <label>
                    Riik
                    <input id="filter-country" name="country" maxlength="3" placeholder="Kõik">
                </label>
                <label>
                    Sorteeri
                    <select id="sort-by" name="sortBy">
                        <option value="totalPoints">Punktid</option>
                        <option value="name">Nimi</option>
                        <option value="country">Riik</option>
                    </select>
                </label>
                <label>
                    Suund
                    <select id="direction" name="direction">
                        <option value="desc">Kahanev</option>
                        <option value="asc">Kasvav</option>
                    </select>
                </label>
                <label>
                    Lehel
                    <select id="page-size" name="size">
                        <option>5</option>
                        <option selected>10</option>
                        <option>20</option>
                    </select>
                </label>
            </form>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Nimi</th>
                        <th>Riik</th>
                        <th>Punktid</th>
                        <th>Tulemused</th>
                    </tr>
                    </thead>
                    <tbody id="athlete-rows"></tbody>
                </table>
            </div>

            <footer class="pager">
                <button id="prev-page" type="button">Eelmine</button>
                <span id="page-label"></span>
                <button id="next-page" type="button">Järgmine</button>
            </footer>
        </section>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
